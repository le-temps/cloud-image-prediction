model:
  name: convlstm
  arch: ConvLSTM
  num_layers: 4
  hidden_dims: [64, 64, 64, 64]
  kernel_size: 3

training:
  epochs: 200
  batch_size: 16
  optimizer:
    name: adamw
    lr: 1.0e-3
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    T_max: 200
    eta_min: 1.0e-6
  grad_clip: 1.0
  mixed_precision: bf16
  seed: 42

loss:
  mse_weight: 1.0
  ssim_weight: 0.5

distributed:
  backend: nccl
  num_gpus: 1
