model:
  name: simvp
  arch: SimVP
  hid_S: 64
  hid_T: 256
  N_S: 4
  N_T: 8
  spatio_kernel: 3
  act_inplace: true

training:
  epochs: 200
  batch_size: 16
  optimizer:
    name: adamw
    lr: 1.0e-3
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    T_max: 200
    eta_min: 1.0e-6
  grad_clip: 1.0
  mixed_precision: bf16
  seed: 42

loss:
  mse_weight: 1.0
  ssim_weight: 0.5

distributed:
  backend: nccl
  num_gpus: 1
